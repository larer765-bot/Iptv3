<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamWave - Web IPTV Player</title>
    <!-- Lien vers le manifest pour l'installation en App -->
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hls.js pour la lecture vidéo -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4">

    <div class="max-w-2xl mx-auto space-y-4">
        <h1 class="text-2xl font-bold text-center">StreamWave IPTV</h1>
        
        <!-- Zone de saisie -->
        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
            <input type="text" id="playlist-url" 
                class="w-full bg-gray-950 border border-gray-700 p-3 rounded-lg mb-2 text-sm focus:outline-none focus:border-blue-500" 
                placeholder="Collez le lien M3U ici..." 
                value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
            <button onclick="chargerFlux()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold">
                Charger le flux
            </button>
        </div>

        <!-- Lecteur -->
        <div class="bg-black rounded-xl overflow-hidden aspect-video border border-gray-800">
            <video id="video-player" controls autoplay class="w-full h-full"></video>
        </div>

        <!-- Zone de status -->
        <div id="status" class="text-xs text-gray-500 text-center">
            Prêt à charger...
        </div>
    </div>

    <script>
        function chargerFlux() {
            const url = document.getElementById('playlist-url').value;
            const video = document.getElementById('video-player');
            const status = document.getElementById('status');
            
            status.textContent = "Chargement en cours...";

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    status.textContent = "Lecture en cours.";
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    status.textContent = "Erreur : Vérifiez le lien ou le CORS.";
                });
            } else {
                status.textContent = "Votre navigateur ne supporte pas le lecteur.";
            }
        }
    </script>
</body>
</html>
